name: Daily Stock Analysis Auto-Run

on:
  # 1. 定时触发：每天北京时间 16:00（UTC时间早上 08:00），周一至周五运行
  schedule:
    - cron: '0 8 * * 1-5'
  # 2. 手动触发：允许你在页面上点击按钮随时运行
  workflow_dispatch: 

jobs:
  run-analysis:
    runs-on: ubuntu-latest # 使用最新的 Ubuntu 云服务器

    steps:
    - name: 📥 拉取最新代码
      uses: actions/checkout@v4

    - name: 🐍 配置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # 缓存依赖，让每天的运行速度更快

    - name: 📦 安装项目依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🚀 运行分析脚本
      env: 
        # 这里将保险箱(Secrets)里的钥匙，映射给程序使用
        # 等号左边是程序读取的变量名，右边是你在第二步填写的 Secret 名称
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        STOCK_LIST: ${{ secrets.STOCK_LIST }}
        WXPUSHER_TOKEN: ${{ secrets.WXPUSHER_TOKEN }}
        WXPUSHER_UID: ${{ secrets.WXPUSHER_UID }}
        # TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}  # 如果有其他Key，取消这行注释并对应修改
      run: |
        python main.py
