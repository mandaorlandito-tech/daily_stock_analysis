name: Daily Stock Analysis Auto-Run

on:
  # 1. 定时触发：每天北京时间 16:00（UTC时间早上 08:00），周一至周五运行
  schedule:
    - cron: '0 8 * * 1-5'
  # 2. 手动触发：允许你在页面上点击按钮随时运行
  workflow_dispatch: 

jobs:
  run-analysis:
    runs-on: ubuntu-latest # 使用最新的 Ubuntu 云服务器

    steps:
    - name: 📥 拉取最新代码
      uses: actions/checkout@v4

    - name: 🐍 配置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # 缓存依赖，让每天的运行速度更快

    - name: 📦 安装项目依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🚀 运行分析脚本
      env: 
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        STOCK_LIST: ${{ secrets.STOCK_LIST }}
        EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        REPORT_TYPE: 'full'
        MERGE_EMAIL_NOTIFICATION: 'true'
        ANALYSIS_DELAY: '20'
      run: |
        python main.py --force-run --workers 1
        
    - name: 📊 保存分析产物
      if: always() 
      uses: actions/upload-artifact@v4
      with:
        name: stock-analysis-results
        path: |
          *.md
          output/
          logs/
