name: Daily Stock Analysis Auto-Run

on:
  schedule:
    - cron: '0 8 * * 1-5' # 北京时间 18:00
  workflow_dispatch:

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    steps:
    - name: 📥 拉取最新代码
      uses: actions/checkout@v4

    - name: 🐍 配置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: 📦 安装项目依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # 强制升级核心抓取库，确保接口不失效
        pip install akshare efinance --upgrade 

    - name: 🚀 运行分析脚本
      env: 
        # 1. 基础数据 (保持不变)
        STOCK_LIST: ${{ secrets.STOCK_LIST }}
        EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        
        # 2. 搜索模块 (已对齐代码库暗号)
        # 🔑 核心钥匙：请确保 GitHub Secrets 里已添加 ANSPIRE_API_KEY
        SERPAPI_API_KEYS: ${{ secrets.SERPAPI_API_KEY }}
        ANSPIRE_API_KEYS: ${{ secrets.ANSPIRE_API_KEY }}
        SERPER_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
        
        # 🚀 强制驱动：将 anspire 设为首选，serpapi 为备份，彻底抛弃 searxng
        SEARCH_PROVIDER: 'anspire,serpapi'
        SEARCH_ENGINE: 'anspire'             
        NEWS_SEARCH_SOURCE: 'anspire'         
        
        # 🚫 物理封锁 SearXNG (保持之前的强力屏蔽)
        ENABLE_SEARCH: 'true'
        USE_SEARXNG: 'false'
        SEARXNG_URL: ''
        SEARX_INSTANCES: ''
        SEARXNG_PUBLIC_INSTANCES_ENABLED: 'false'
        
        # 3. DeepSeek 大脑 (保持不变)
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
        OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        
        # 4. 数据源优先级 (efinance 依然置顶)
        DATA_SOURCE_PRIORITY: 'efinance,akshare,tushare'
        FINANCIAL_SOURCE_PRIORITY: 'efinance,akshare,tushare'
        
        # 5. 产出控制
        REPORT_LANGUAGE: 'zh'
        REPORT_TYPE: 'full'
        MERGE_EMAIL_NOTIFICATION: 'true'
        ANALYSIS_DELAY: '30'                 # 建议略微增加延迟，确保多路搜索稳定
      run: |
        # 加上 --workers 1 确保单线程稳定分析，不触发 API 频率限制
        python main.py --force-run --workers 1
        
    - name: 📊 保存分析产物
      if: always() 
      uses: actions/upload-artifact@v4
      with:
        name: stock-analysis-results
        path: |
          *.md
          output/
          logs/
