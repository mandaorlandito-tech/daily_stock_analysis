name: Daily Stock Analysis Auto-Run

on:
  # 1. 定时触发：每天北京时间 16:00（UTC时间早上 08:00），周一至周五运行
  schedule:
    - cron: '0 8 * * 1-5'
  # 2. 手动触发：允许你在页面上点击按钮随时运行
  workflow_dispatch: 

jobs:
  run-analysis:
    runs-on: ubuntu-latest # 使用最新的 Ubuntu 云服务器

    steps:
    - name: 📥 拉取最新代码
      uses: actions/checkout@v4

    - name: 🐍 配置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # 缓存依赖，让每天的运行速度更快

    - name: 📦 安装项目依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🚀 运行分析脚本
      env: 
        # 1. 基础令牌 (保险箱里的钥匙)
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        STOCK_LIST: ${{ secrets.STOCK_LIST }}
        EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        
        # 2. DeepSeek 备份引擎 (当 Gemini 抽风时启用)
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
        OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        
        # 3. === 核心：数据源优先级调优 (解决资料缺失) ===
        # 强制让程序去爬取免费的 Akshare 和 efinance 接口
        DATA_SOURCE_PRIORITY: 'akshare,efinance,tushare'
        REALTIME_SOURCE_PRIORITY: 'efinance,akshare,tencent'
        FINANCIAL_SOURCE_PRIORITY: 'akshare,efinance,tushare' # 解决“业绩预期”缺失的关键
        
        # 4. 报告排版与性能优化
        REPORT_TYPE: 'full'                # 强制完整个股分析
        MERGE_EMAIL_NOTIFICATION: 'true'   # 合并报告，防止被邮件服务器拦截
        ANALYSIS_DELAY: '15'               # 每次分析间隔15秒，保护API不被封
      run: |
        # 使用单线程运行，确保数据抓取的稳定性
        python main.py --force-run --workers 1
        
    - name: 📊 保存分析产物
      if: always() 
      uses: actions/upload-artifact@v4
      with:
        name: stock-analysis-results
        path: |
          *.md
          output/
          logs/
