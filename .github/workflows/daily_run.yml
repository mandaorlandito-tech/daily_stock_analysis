name: Daily Stock Analysis Auto-Run

on:
  schedule:
    - cron: '0 8 * * 1-5' # 北京时间 16:00
  workflow_dispatch:

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    steps:
    - name: 📥 拉取最新代码
      uses: actions/checkout@v4

    - name: 🐍 配置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: 📦 安装项目依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # ⚠️ 修正点 1：强制升级 akshare，这是解决“财务数据缺失”的物理前提
        pip install akshare --upgrade 

    - name: 🚀 运行分析脚本
      env: 
        # 基础配置
        STOCK_LIST: ${{ secrets.STOCK_LIST }}
        EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        
        # ⚠️ 修正点 2：配置 SerpApi 搜索增强 (你刚申请的钥匙)
        SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
        
        # DeepSeek API 配置
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
        OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        
        # ⚠️ 修正点 3：数据源优先级 (强制先薅免费的 Akshare 羊毛)
        DATA_SOURCE_PRIORITY: 'akshare,efinance,tushare'
        FINANCIAL_SOURCE_PRIORITY: 'akshare,efinance,tushare'
        
        # ⚠️ 修正点 4：语言设定 (确保搜索和报告都是纯中文)
        REPORT_LANGUAGE: 'zh'
        
        # 报告优化参数
        REPORT_TYPE: 'full'
        MERGE_EMAIL_NOTIFICATION: 'true'
        ANALYSIS_DELAY: '15' # 建议设为 15，给搜索和爬虫留出安全时间
      run: |
        python main.py --force-run --workers 1

    - name: 📊 保存分析产物
      if: always() 
      uses: actions/upload-artifact@v4
      with:
        name: stock-analysis-results
        path: |
          *.md
          output/
          logs/
