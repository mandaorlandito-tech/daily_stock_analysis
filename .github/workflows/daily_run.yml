name: Daily Stock Analysis Auto-Run

on:
  # 1. 定时触发：每天北京时间 16:00（UTC时间早上 08:00），周一至周五运行
  schedule:
    - cron: '0 8 * * 1-5'
  # 2. 手动触发：允许你在页面上点击按钮随时运行
  workflow_dispatch: 

jobs:
  run-analysis:
    runs-on: ubuntu-latest # 使用最新的 Ubuntu 云服务器

    steps:
    - name: 📥 拉取最新代码
      uses: actions/checkout@v4

    - name: 🐍 配置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # 缓存依赖，让每天的运行速度更快

    - name: 📦 安装项目依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🚀 运行分析脚本
      env: 
        # 基础数据源与邮件配置
        STOCK_LIST: ${{ secrets.STOCK_LIST }}
        EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        
        # === 核心：DeepSeek API 配置 ===
        # 程序会自动识别 OPENAI_ 前缀并切换到 DeepSeek 引擎
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
        OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        
        # 报告优化参数
        REPORT_TYPE: 'full'                # 输出完整深度分析
        MERGE_EMAIL_NOTIFICATION: 'true'   # 合并为一封精美邮件
        ANALYSIS_DELAY: '5'                # DeepSeek 响应快，延迟设为 5 秒即可
      run: |
        # 推荐使用 --workers 1 模式，让分析更有条理
        python main.py --force-run --workers 1
        
    - name: 📊 保存分析产物
      if: always() 
      uses: actions/upload-artifact@v4
      with:
        name: stock-analysis-results
        path: |
          *.md
          output/
          logs/
