name: Daily Stock Analysis Auto-Run

on:
  schedule:
    - cron: '0 8 * * 1-5' # 北京时间 16:00
  workflow_dispatch:

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    steps:
    - name: 📥 拉取最新代码
      uses: actions/checkout@v4

    - name: 🐍 配置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: 📦 安装项目依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # 强制升级核心抓取库，确保接口不失效
        pip install akshare efinance --upgrade 

    - name: 🚀 运行分析脚本
      env: 
        # 1. 基础配置
        STOCK_LIST: ${{ secrets.STOCK_LIST }}
        EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        
        # 2. 搜索模块 (针对日志报错的“核弹级”修复)
        # 无论脚本认哪个名字，我们全给它堵上！
        SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
        SERPER_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
        SERP_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
        
        # 强制切换驱动，并清空所有 SearXNG 的 fallback 路径
        SEARCH_PROVIDER: 'serpapi'
        SEARCH_ENGINE: 'serpapi'
        NEWS_SEARCH_ENGINE: 'serpapi'
        ENABLE_SEARCH: 'true'
        SEARXNG_URL: 'disabled'              # ⚠️ 强行写死，让它找不到 SearXNG
        SEARX_INSTANCES: '[]'                # ⚠️ 清空实例池
        
        # 3. DeepSeek 主引擎
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
        OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        
        # 4. 数据源优先级
        DATA_SOURCE_PRIORITY: 'efinance,akshare,tushare'
        FINANCIAL_SOURCE_PRIORITY: 'efinance,akshare,tushare'
        
        # 5. 报告控制
        REPORT_LANGUAGE: 'zh'
        REPORT_TYPE: 'full'
        MERGE_EMAIL_NOTIFICATION: 'true'
        ANALYSIS_DELAY: '20' 
      run: |
        python main.py --force-run --workers 1
    - name: 📊 保存分析产物
      if: always() 
      uses: actions/upload-artifact@v4
      with:
        name: stock-analysis-results
        path: |
          *.md
          output/
          logs/
